var React_useState = React.useState;
var React_useCallback = React.useCallback;
var XL = window.XLSX;

// =============================================================
// データ構造
//
// supplier: { id, name, lots:[ {id, lotQty(数値), unitCost} ] }
// material: { id, name, unit, qty,
//             suppliers:[], selectedSupplierId, selectedLotId }
// process:  { id, name, qty,
//             suppliers:[], selectedSupplierId, selectedLotId }
// part:     { id, name, materials[], processes[], children[] }
// =============================================================

var _seq = 1000;
function uid(p){ return p+'-'+(++_seq); }

function newLot(qty, unitCost){
  return { id:uid('L'), lotQty:Number(qty)||1, unitCost:Number(unitCost)||0 };
}
function newSupplier(name){
  return { id:uid('S'), name:name||'新規サプライヤ', lots:[ newLot(100,0) ] };
}
function newMat(){
  var s1=newSupplier('サプライヤA'), s2=newSupplier('サプライヤB');
  return { id:uid('M'), name:'新規材料', unit:'個', qty:1,
           suppliers:[s1,s2], selectedSupplierId:s1.id, selectedLotId:s1.lots[0].id };
}
function newProc(){
  var s1=newSupplier('協力会社A'), s2=newSupplier('協力会社B');
  return { id:uid('P'), name:'新規工程', qty:1,
           suppliers:[s1,s2], selectedSupplierId:s1.id, selectedLotId:s1.lots[0].id };
}
function newPart(name){
  return { id:uid('PT'), name:name||'新規部品', materials:[], processes:[], children:[] };
}

// 選択中サプライヤ取得
function getSelSupplier(row){
  return row.suppliers.filter(function(s){return s.id===row.selectedSupplierId;})[0]
    || row.suppliers[0] || null;
}
// 選択中ロット取得（サプライヤのlotsから）
function getSelLot(row){
  var sup = getSelSupplier(row);
  if(!sup) return null;
  return sup.lots.filter(function(l){return l.id===row.selectedLotId;})[0]
    || sup.lots[0] || null;
}
function getUnitCost(row){ var l=getSelLot(row); return l?parseFloat(l.unitCost)||0:0; }
function rowCost(row){ return getUnitCost(row)*(parseFloat(row.qty)||1); }

function partCost(part){
  var mat = part.materials.reduce(function(s,m){return s+rowCost(m);},0);
  var proc= part.processes.reduce(function(s,p){return s+rowCost(p);},0);
  var sub = part.children.reduce(function(s,c){return s+partCost(c).total;},0);
  return {mat:mat,proc:proc,sub:sub,total:mat+proc+sub};
}
function productCost(prod){
  var mat=0,proc=0,sub=0;
  prod.parts.forEach(function(pt){var c=partCost(pt);mat+=c.mat;proc+=c.proc;sub+=c.sub;});
  var unit=mat+proc+sub;
  return {mat:mat,proc:proc,sub:sub,unit:unit,total:unit*prod.quantity};
}

var fmt=function(n){return '¥'+Math.round(n).toLocaleString('ja-JP');};
var fmtDate=function(iso){
  var d=new Date(iso);
  return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')
    +' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
};

// サンプルデータ

      {id:uid('PT'),name:'メインフレーム',materials:[

          {name:'鉄鋼商事B',lots:[{q:100,c:130},{q:500,c:100}]},
        ]),
        makeRow('M','角パイプ 50×50','m',6,[
          {name:'鉄鋼商事A',lots:[{q:50,c:480},{q:200,c:380}]},
          {name:'メタルワン',lots:[{q:50,c:460},{q:200,c:360}]},
        ]),

        makeRow('P','レーザー切断',null,1,[

        ]),
        makeRow('P','溶接',null,1,[
          {name:'溶接工業㈱',lots:[{q:50,c:3800},{q:100,c:3400}]},
          {name:'製缶㈱',    lots:[{q:50,c:3600},{q:100,c:3200}]},
        ]),
      ],children:[
        {id:uid('PT'),name:'補強リブ',materials:[
          makeRow('M','鋼板 t=2mm','kg',5,[
            {name:'鉄鋼商事A',lots:[{q:100,c:120},{q:500,c:95}]},
          ]),
        ],processes:[
          makeRow('P','プレス加工',null,2,[
            {name:'プレス工業㈱',lots:[{q:100,c:900},{q:500,c:760}]},

          {name:'精密工業㈱',lots:[{q:100,c:3200},{q:500,c:2600}]},
          {name:'切削加工㈱',lots:[{q:100,c:3000},{q:500,c:2500}]},
        ]),
        makeRow('P','表面処理（塗装）',null,1,[
          {name:'塗装工業㈱',lots:[{q:100,c:1500},{q:500,c:1200}]},
        ]),
      ],children:[]},
    ]},

}

// ツリー操作
function updatePartAt(parts,path,fn){
  if(!path.length) return parts;
  var h=path[0],t=path.slice(1);
  return parts.map(function(pt,i){
    if(i!==h) return pt;
    if(t.length===0) return fn(pt);
    return Object.assign({},pt,{children:updatePartAt(pt.children,t,fn)});
  });
}
function removePartAt(parts,path){
  if(path.length===1) return parts.filter(function(_,i){return i!==path[0];});
  var h=path[0],t=path.slice(1);
  return parts.map(function(pt,i){return i!==h?pt:Object.assign({},pt,{children:removePartAt(pt.children,t)});});
}
function insertChildAt(parts,path){
  return updatePartAt(parts,path,function(pt){return Object.assign({},pt,{children:pt.children.concat([newPart()])});});
}

// Excel出力
function exportXL(products){
  var wb=XL.utils.book_new();
  var rows=[['BOM原価集計レポート'],['出力日時',new Date().toLocaleString('ja-JP')],[],
    ['製品コード','製品名','製造数量','目標コスト/台','材料費/台','加工費/台','台あたり原価','ロット原価','差分/台']];
  var tg=0;
  products.forEach(function(prod){
    var c=productCost(prod);
    var diff=prod.targetCost>0?c.unit-prod.targetCost:'';
    tg+=c.total;
    rows.push([prod.id,prod.name,prod.quantity,prod.targetCost||'',c.mat,c.proc,c.unit,c.total,diff]);
  });
  rows.push([],[,'','','','','','合計',tg]);
  var ws1=XL.utils.aoa_to_sheet(rows);
  ws1['!cols']=[{wch:12},{wch:20},{wch:10},{wch:14},{wch:14},{wch:14},{wch:14},{wch:14},{wch:12}];
  XL.utils.book_append_sheet(wb,ws1,'サマリ');
  products.forEach(function(prod){
    var sr=[[prod.id+'　'+prod.name+'　×'+prod.quantity+'台'+(prod.targetCost>0?'　目標コスト: '+fmt(prod.targetCost)+'/台':'')],[],
      ['階層','部品名','種別','品目名','単位','数量','サプライヤ','ロット数量','単価','金額']];
    function flat(part,depth){
      var pre=Array(depth+1).join('　'),c=partCost(part);
      sr.push(['L'+depth,pre+part.name,'【合計】','','','','','','',c.total]);
      part.materials.forEach(function(m){
        var sup=getSelSupplier(m),lot=getSelLot(m),uc=getUnitCost(m);
        sr.push(['',pre+'  '+m.name,'材料',m.name,m.unit,m.qty,sup?sup.name:'',lot?lot.lotQty:'',uc,rowCost(m)]);
      });
      part.processes.forEach(function(p){
        var sup=getSelSupplier(p),lot=getSelLot(p),uc=getUnitCost(p);
        sr.push(['',pre+'  '+p.name,'加工',p.name,'工程',p.qty,sup?sup.name:'',lot?lot.lotQty:'',uc,rowCost(p)]);
      });
      part.children.forEach(function(c){flat(c,depth+1);});
    }
    prod.parts.forEach(function(pt){flat(pt,0);});
    var c=productCost(prod);
    sr.push([],[,'【製品合計】','','','','','','','材料費',c.mat],
      ['','','','','','','','','加工費',c.proc],
      ['','','','','','','','','台あたり原価',c.unit],
      ['','','','','','','','','ロット原価×'+prod.quantity,c.total]);
    if(prod.targetCost>0){
      sr.push(['','','','','','','','','目標コスト/台',prod.targetCost],
               ['','','','','','','','','差分/台',c.unit-prod.targetCost]);
    }
    var ws=XL.utils.aoa_to_sheet(sr);
    ws['!cols']=[{wch:6},{wch:22},{wch:8},{wch:18},{wch:6},{wch:6},{wch:16},{wch:10},{wch:12},{wch:12}];
    XL.utils.book_append_sheet(wb,ws,prod.id.slice(0,28));
  });
  XL.writeFile(wb,'BOM原価集計_'+new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')+'.xlsx');
}

// ========== App ==========
function App(){
  var ps=React_useState(makeSample); var products=ps[0],setProducts=ps[1];
  var as=React_useState([]); var archives=as[0],setArchives=as[1];
  var ss=React_useState(function(){return makeSample()[0].id;}); var selectedId=ss[0],setSelectedId=ss[1];
  var ts=React_useState('bom'); var tab=ts[0],setTab=ts[1];
  var sbs=React_useState(false); var showSB=sbs[0],setShowSB=sbs[1];
  var ans=React_useState(''); var arcNote=ans[0],setArcNote=ans[1];
  var ams=React_useState(false); var showAM=ams[0],setShowAM=ams[1];

  var updProd=React_useCallback(function(pid,fn){
    setProducts(function(prev){return prev.map(function(p){return p.id===pid?fn(p):p;});});
  },[]);
  function updTree(path,fn){updProd(selectedId,function(p){return Object.assign({},p,{parts:updatePartAt(p.parts,path,fn)});});}
  function addChild(path){updProd(selectedId,function(p){return Object.assign({},p,{parts:insertChildAt(p.parts,path)});});}
  function removePart(path){updProd(selectedId,function(p){return Object.assign({},p,{parts:removePartAt(p.parts,path)});});}
  function addRoot(){updProd(selectedId,function(p){return Object.assign({},p,{parts:p.parts.concat([newPart()])});});}
  function renamePart(path,name){updTree(path,function(pt){return Object.assign({},pt,{name:name});});}

  // 材料
  function addMat(path){updTree(path,function(pt){return Object.assign({},pt,{materials:pt.materials.concat([newMat()])});});}
  function removeMat(path,mid){updTree(path,function(pt){return Object.assign({},pt,{materials:pt.materials.filter(function(m){return m.id!==mid;})});});}
  function updMat(path,mid,fn){updTree(path,function(pt){return Object.assign({},pt,{materials:pt.materials.map(function(m){return m.id===mid?fn(m):m;})});});}
  function setMF(path,mid,f,v){updMat(path,mid,function(m){var o=Object.assign({},m);o[f]=(f==='name'||f==='unit')?v:v;return o;});}
  // サプライヤ選択（サプライヤ変更時はそのサプライヤの先頭ロットを自動選択）
  function selMSup(path,mid,sid){updMat(path,mid,function(m){
    var sup=m.suppliers.filter(function(s){return s.id===sid;})[0];
    return Object.assign({},m,{selectedSupplierId:sid,selectedLotId:sup&&sup.lots[0]?sup.lots[0].id:null});
  });}
  function selMLot(path,mid,lid){updMat(path,mid,function(m){return Object.assign({},m,{selectedLotId:lid});});}
  // サプライヤCRUD
  function addMSup(path,mid){updMat(path,mid,function(m){var s=newSupplier();return Object.assign({},m,{suppliers:m.suppliers.concat([s]),selectedSupplierId:m.suppliers.length===0?s.id:m.selectedSupplierId,selectedLotId:m.suppliers.length===0?s.lots[0].id:m.selectedLotId});});}
  function updMSup(path,mid,sid,field,val){updMat(path,mid,function(m){return Object.assign({},m,{suppliers:m.suppliers.map(function(s){return s.id===sid?Object.assign({},s,(function(o){o[field]=val;return o;})({})):s;})});});}
  function removeMSup(path,mid,sid){updMat(path,mid,function(m){var sups=m.suppliers.filter(function(s){return s.id!==sid;});var ns=sups[0]||null;return Object.assign({},m,{suppliers:sups,selectedSupplierId:ns?ns.id:null,selectedLotId:ns&&ns.lots[0]?ns.lots[0].id:null});});}
  // ロットCRUD（材料）
  function addMLot(path,mid,sid){updMat(path,mid,function(m){return Object.assign({},m,{suppliers:m.suppliers.map(function(s){if(s.id!==sid)return s;var l=newLot(1,0);return Object.assign({},s,{lots:s.lots.concat([l])});})});});}
  function updMLot(path,mid,sid,lid,f,v){updMat(path,mid,function(m){return Object.assign({},m,{suppliers:m.suppliers.map(function(s){if(s.id!==sid)return s;return Object.assign({},s,{lots:s.lots.map(function(l){return l.id===lid?Object.assign({},l,(function(o){o[f]=v;return o;})({})):l;})});})});});}
  function removeMLot(path,mid,sid,lid){updMat(path,mid,function(m){return Object.assign({},m,{suppliers:m.suppliers.map(function(s){if(s.id!==sid)return s;var lots=s.lots.filter(function(l){return l.id!==lid;});return Object.assign({},s,{lots:lots});})});});}

  // 加工（材料と同構造）
  function addProc(path){updTree(path,function(pt){return Object.assign({},pt,{processes:pt.processes.concat([newProc()])});});}
  function removeProc(path,pid){updTree(path,function(pt){return Object.assign({},pt,{processes:pt.processes.filter(function(p){return p.id!==pid;})});});}
  function updProc(path,pid,fn){updTree(path,function(pt){return Object.assign({},pt,{processes:pt.processes.map(function(p){return p.id===pid?fn(p):p;})});});}
  function setPF(path,pid,f,v){updProc(path,pid,function(p){var o=Object.assign({},p);o[f]=v;return o;});}
  function selPSup(path,pid,sid){updProc(path,pid,function(p){var sup=p.suppliers.filter(function(s){return s.id===sid;})[0];return Object.assign({},p,{selectedSupplierId:sid,selectedLotId:sup&&sup.lots[0]?sup.lots[0].id:null});});}
  function selPLot(path,pid,lid){updProc(path,pid,function(p){return Object.assign({},p,{selectedLotId:lid});});}
  function addPSup(path,pid){updProc(path,pid,function(p){var s=newSupplier();return Object.assign({},p,{suppliers:p.suppliers.concat([s]),selectedSupplierId:p.suppliers.length===0?s.id:p.selectedSupplierId,selectedLotId:p.suppliers.length===0?s.lots[0].id:p.selectedLotId});});}
  function updPSup(path,pid,sid,field,val){updProc(path,pid,function(p){return Object.assign({},p,{suppliers:p.suppliers.map(function(s){return s.id===sid?Object.assign({},s,(function(o){o[field]=val;return o;})({})):s;})});});}
  function removePSup(path,pid,sid){updProc(path,pid,function(p){var sups=p.suppliers.filter(function(s){return s.id!==sid;});var ns=sups[0]||null;return Object.assign({},p,{suppliers:sups,selectedSupplierId:ns?ns.id:null,selectedLotId:ns&&ns.lots[0]?ns.lots[0].id:null});});}
  function addPLot(path,pid,sid){updProc(path,pid,function(p){return Object.assign({},p,{suppliers:p.suppliers.map(function(s){if(s.id!==sid)return s;var l=newLot(1,0);return Object.assign({},s,{lots:s.lots.concat([l])});})});});}
  function updPLot(path,pid,sid,lid,f,v){updProc(path,pid,function(p){return Object.assign({},p,{suppliers:p.suppliers.map(function(s){if(s.id!==sid)return s;return Object.assign({},s,{lots:s.lots.map(function(l){return l.id===lid?Object.assign({},l,(function(o){o[f]=v;return o;})({})):l;})});})});});}
  function removePLot(path,pid,sid,lid){updProc(path,pid,function(p){return Object.assign({},p,{suppliers:p.suppliers.map(function(s){if(s.id!==sid)return s;var lots=s.lots.filter(function(l){return l.id!==lid;});return Object.assign({},s,{lots:lots});})});});}

  function setQty(q){updProd(selectedId,function(p){return Object.assign({},p,{quantity:Math.max(1,Number(q)||1)});});}
  function setProdName(n){updProd(selectedId,function(p){return Object.assign({},p,{name:n});});}
  function setTargetCost(v){updProd(selectedId,function(p){return Object.assign({},p,{targetCost:parseFloat(v)||0});});}
  function addProduct(){
    var id='PRD-'+String(products.length+1).padStart(3,'0');
    setProducts(function(prev){return prev.concat([{id:id,name:'新規製品',quantity:1,parts:[]}]);});
    setSelectedId(id);setShowSB(false);
  }
  function commitArchive(){
    setArchives(function(prev){return [{id:uid('ARC'),note:arcNote.trim()||'バージョン確定',savedAt:new Date().toISOString(),products:JSON.parse(JSON.stringify(products))}].concat(prev);});
    setArcNote('');setShowAM(false);
  }
  function restoreArchive(arc){
    if(!window.confirm('「'+arc.note+'」を復元しますか？'))return;
    setProducts(arc.products);
    setSelectedId(arc.products[0]?arc.products[0].id:null);setTab('bom');
  }
  function deleteArchive(id){if(!window.confirm('削除しますか？'))return;setArchives(function(prev){return prev.filter(function(a){return a.id!==id;});});}

  function mkCb(path){return {
    onRename:function(n){renamePart(path,n);},onRemove:function(){removePart(path);},onAddChild:function(){addChild(path);},
    onAddMat:function(){addMat(path);},
    onRemoveMat:function(mid){removeMat(path,mid);},
    onSetMF:function(mid,f,v){setMF(path,mid,f,v);},
    onSelMSup:function(mid,sid){selMSup(path,mid,sid);},
    onSelMLot:function(mid,lid){selMLot(path,mid,lid);},
    onAddMSup:function(mid){addMSup(path,mid);},
    onUpdMSup:function(mid,sid,f,v){updMSup(path,mid,sid,f,v);},
    onRemoveMSup:function(mid,sid){removeMSup(path,mid,sid);},
    onAddMLot:function(mid,sid){addMLot(path,mid,sid);},
    onUpdMLot:function(mid,sid,lid,f,v){updMLot(path,mid,sid,lid,f,v);},
    onRemoveMLot:function(mid,sid,lid){removeMLot(path,mid,sid,lid);},
    onAddProc:function(){addProc(path);},
    onRemoveProc:function(pid){removeProc(path,pid);},
    onSetPF:function(pid,f,v){setPF(path,pid,f,v);},
    onSelPSup:function(pid,sid){selPSup(path,pid,sid);},
    onSelPLot:function(pid,lid){selPLot(path,pid,lid);},
    onAddPSup:function(pid){addPSup(path,pid);},
    onUpdPSup:function(pid,sid,f,v){updPSup(path,pid,sid,f,v);},
    onRemovePSup:function(pid,sid){removePSup(path,pid,sid);},
    onAddPLot:function(pid,sid){addPLot(path,pid,sid);},
    onUpdPLot:function(pid,sid,lid,f,v){updPLot(path,pid,sid,lid,f,v);},
    onRemovePLot:function(pid,sid,lid){removePLot(path,pid,sid,lid);},
  };}

  var selected=products.filter(function(p){return p.id===selectedId;})[0];

// ========== PartNode ==========
function PartNode(props){
  var part=props.part,path=props.path,depth=props.depth,cb=props.cb,mkCb=props.mkCb;
  var cs=React_useState(false);var collapsed=cs[0],setCollapsed=cs[1];
  var cost=partCost(part);
  var colors=['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981'];
  var dc=colors[depth%colors.length];
  var indent=Math.min(depth*12,36);
  return (
    <div style={{marginLeft:indent,marginBottom:8}}>
      <div style={{background:'#1a1f2e',border:'1px solid #2d3748',borderLeft:'3px solid '+dc,borderRadius:10,overflow:'hidden'}}>
        <div style={{background:'#161b29',borderBottom:'1px solid #2d3748',padding:'7px 10px'}}>
          <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:5}}>
            <button onClick={function(){setCollapsed(function(v){return !v;});}} style={{width:18,height:18,borderRadius:3,background:'transparent',border:'1px solid #2d3748',color:'#64748b',cursor:'pointer',fontSize:8,flexShrink:0}}>{collapsed?'▶':'▼'}</button>
            {depth>0&&<span style={{fontSize:9,color:dc,fontFamily:'monospace',fontWeight:700,flexShrink:0}}>L{depth}</span>}
            <input value={part.name} onChange={function(e){cb.onRename(e.target.value);}} placeholder="部品名"
              style={{flex:1,minWidth:0,background:'#0f1117',border:'1px solid #2d3748',borderRadius:5,color:'#f1f5f9',fontSize:12,fontWeight:700,padding:'3px 7px',outline:'none'}}/>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
            <span style={{fontSize:10,color:'#10b981'}}>材 {fmt(cost.mat)}</span>
            <span style={{fontSize:10,color:'#f59e0b'}}>加 {fmt(cost.proc)}</span>
            {cost.sub>0&&<span style={{fontSize:10,color:'#8b5cf6'}}>子 {fmt(cost.sub)}</span>}
            <span style={{fontSize:11,color:'#e2e8f0',fontWeight:700,marginRight:'auto'}}>{fmt(cost.total)}</span>
            <button onClick={cb.onAddChild} style={{padding:'2px 7px',background:'#1e2d4a',border:'1px solid '+dc+'66',borderRadius:4,color:dc,fontSize:10,fontWeight:700,cursor:'pointer'}}>＋子</button>
            <button onClick={function(){if(window.confirm('「'+part.name+'」を削除しますか？'))cb.onRemove();}} style={{width:20,height:20,borderRadius:4,background:'#3a1a1a',border:'1px solid #7f1d1d',color:'#f87171',cursor:'pointer',fontSize:10,flexShrink:0}}>✕</button>
          </div>
        </div>
        {!collapsed&&(
          <div>
            {/* 材料 */}
            <div style={{borderBottom:'1px solid #2d3748'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 10px'}}>
                <span style={{fontSize:9,fontWeight:700,color:'#10b981',padding:'1px 6px',borderRadius:3,background:'#064e3b'}}>材料費</span>
                <button onClick={cb.onAddMat} style={{fontSize:10,fontWeight:700,background:'transparent',border:'1px solid #10b98155',borderRadius:3,padding:'1px 7px',cursor:'pointer',color:'#10b981'}}>＋追加</button>
              </div>
              {part.materials.length===0
                ?<div style={{padding:'8px',textAlign:'center',color:'#475569',fontSize:10}}>材料がありません</div>
                :part.materials.map(function(m){
                    return <ItemRow key={m.id} row={m} color='#10b981' type='mat'
                      onRemoveRow={function(){cb.onRemoveMat(m.id);}}
                      onSetField={function(f,v){cb.onSetMF(m.id,f,v);}}
                      onSelSup={function(sid){cb.onSelMSup(m.id,sid);}}
                      onSelLot={function(lid){cb.onSelMLot(m.id,lid);}}
                      onAddSup={function(){cb.onAddMSup(m.id);}}
                      onUpdSup={function(sid,f,v){cb.onUpdMSup(m.id,sid,f,v);}}
                      onRemoveSup={function(sid){cb.onRemoveMSup(m.id,sid);}}
                      onAddLot={function(sid){cb.onAddMLot(m.id,sid);}}
                      onUpdLot={function(sid,lid,f,v){cb.onUpdMLot(m.id,sid,lid,f,v);}}
                      onRemoveLot={function(sid,lid){cb.onRemoveMLot(m.id,sid,lid);}}/>;
                  })
              }
            </div>
            {/* 加工 */}
            <div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 10px'}}>
                <span style={{fontSize:9,fontWeight:700,color:'#f59e0b',padding:'1px 6px',borderRadius:3,background:'#431407'}}>加工費</span>
                <button onClick={cb.onAddProc} style={{fontSize:10,fontWeight:700,background:'transparent',border:'1px solid #f59e0b55',borderRadius:3,padding:'1px 7px',cursor:'pointer',color:'#f59e0b'}}>＋追加</button>
              </div>
              {part.processes.length===0
                ?<div style={{padding:'8px',textAlign:'center',color:'#475569',fontSize:10}}>加工工程がありません</div>
                :part.processes.map(function(p){
                    return <ItemRow key={p.id} row={p} color='#f59e0b' type='proc'
                      onRemoveRow={function(){cb.onRemoveProc(p.id);}}
                      onSetField={function(f,v){cb.onSetPF(p.id,f,v);}}
                      onSelSup={function(sid){cb.onSelPSup(p.id,sid);}}
                      onSelLot={function(lid){cb.onSelPLot(p.id,lid);}}
                      onAddSup={function(){cb.onAddPSup(p.id);}}
                      onUpdSup={function(sid,f,v){cb.onUpdPSup(p.id,sid,f,v);}}
                      onRemoveSup={function(sid){cb.onRemovePSup(p.id,sid);}}
                      onAddLot={function(sid){cb.onAddPLot(p.id,sid);}}
                      onUpdLot={function(sid,lid,f,v){cb.onUpdPLot(p.id,sid,lid,f,v);}}
                      onRemoveLot={function(sid,lid){cb.onRemovePLot(p.id,sid,lid);}}/>;
                  })
              }
            </div>
          </div>
        )}
      </div>
      {!collapsed&&part.children.map(function(child,ci){
        var np=depth===0?[path[0],ci]:path.concat([ci]);
        return <PartNode key={child.id} part={child} path={np} depth={depth+1} cb={mkCb(np)} mkCb={mkCb}/>;
      })}
    </div>
  );
}

// ========== 数値入力ヘルパー（編集中は文字列保持、blur時に確定、先頭0除去） ==========
function NumInput(props){
  var ls=React_useState(String(props.value));var local=ls[0],setLocal=ls[1];
  var prev=React.useRef(props.value);
  if(prev.current!==props.value){ prev.current=props.value; setLocal(String(props.value)); }
  function handleChange(e){
    var v=e.target.value;
    // 先頭の余分な0を除去（"01"→"1"、"0."はそのまま）
    if(/^0[0-9]/.test(v)) v=v.replace(/^0+/,'');
    if(v==='') v='0';
    setLocal(v);
  }
  function handleBlur(){
    var n=parseFloat(local);
    if(!isNaN(n)){ setLocal(String(n)); props.onChange(n); }
    else{ setLocal(String(props.value)); }
  }
  return <input type="text" inputMode="decimal" value={local}
    onChange={handleChange} onBlur={handleBlur} style={props.style}/>;
}

  var isMat=type==='mat';
  return (
    <div style={{borderBottom:'1px solid #1e2533'}}>
      {/* メイン行 */}
      <div style={{display:'flex',alignItems:'center',gap:4,padding:'4px 8px',flexWrap:'wrap'}}>
        <button onClick={function(){if(window.confirm('「'+row.name+'」を削除しますか？'))props.onRemoveRow();}} style={{width:18,height:18,borderRadius:3,background:'transparent',border:'1px solid #3a2530',color:'#94556a',cursor:'pointer',fontSize:9,flexShrink:0}}>✕</button>
        <input value={row.name} onChange={function(e){props.onSetField('name',e.target.value);}} placeholder={isMat?'材料名':'工程名'}
          style={{flex:'1 1 80px',minWidth:60,background:'#0f1117',border:'1px solid #2d3748',borderRadius:4,color:'#e2e8f0',padding:'3px 5px',fontSize:11,outline:'none'}}/>

}

// ========== サプライヤ集計ロジック ==========
function calcSupplierSummary(products){
  // supName -> { name, mat:0, proc:0, total:0, items:[] }
  var map = {};
  function addItem(supName, type, prodName, partName, itemName, cost, qty){
    if(!map[supName]) map[supName]={name:supName,mat:0,proc:0,total:0,items:[]};
    var entry = map[supName];
    if(type==='mat') entry.mat+=cost; else entry.proc+=cost;
    entry.total+=cost;
    entry.items.push({type:type,prodName:prodName,partName:partName,itemName:itemName,cost:cost,qty:qty});
  }
  function walkPart(part, prodName, depth){
    var label = Array(depth+1).join('　')+part.name;
    part.materials.forEach(function(m){
      var sup=getSelSupplier(m);
      if(sup) addItem(sup.name,'mat',prodName,label,m.name,rowCost(m),m.qty);
    });
    part.processes.forEach(function(p){
      var sup=getSelSupplier(p);
      if(sup) addItem(sup.name,'proc',prodName,label,p.name,rowCost(p),p.qty);
    });
    part.children.forEach(function(c){walkPart(c,prodName,depth+1);});
  }
  products.forEach(function(prod){
    prod.parts.forEach(function(pt){walkPart(pt,prod.name,0);});
  });
  // 配列に変換してtotal降順ソート
  return Object.keys(map).map(function(k){return map[k];}).sort(function(a,b){return b.total-a.total;});
}

function exportSupplierXL(products){
  var summary = calcSupplierSummary(products);
  var wb = XL.utils.book_new();
  // サマリシート
  var rows=[['サプライヤ別原価集計'],['出力日時',new Date().toLocaleString('ja-JP')],[],
    ['サプライヤ名','材料費','加工費','合計','構成比']];
  var grandTotal = summary.reduce(function(s,sup){return s+sup.total;},0);
  summary.forEach(function(sup){
    rows.push([sup.name, sup.mat, sup.proc, sup.total, grandTotal>0?Math.round(sup.total/grandTotal*1000)/10+'%':'0%']);
  });
  rows.push([],[,'合計','',grandTotal,'100%']);
  var ws1=XL.utils.aoa_to_sheet(rows);
  ws1['!cols']=[{wch:20},{wch:14},{wch:14},{wch:14},{wch:10}];
  XL.utils.book_append_sheet(wb,ws1,'サプライヤ集計');
  // 明細シート（サプライヤごと）
  summary.forEach(function(sup){
    var sr=[[sup.name],[],['種別','製品','部品','品目','数量','金額']];
    sup.items.forEach(function(item){
      sr.push([item.type==='mat'?'材料':'加工',item.prodName,item.partName,item.itemName,item.qty,item.cost]);
    });
    sr.push([],[,'','','合計','',sup.total]);
    var ws=XL.utils.aoa_to_sheet(sr);
    ws['!cols']=[{wch:6},{wch:18},{wch:20},{wch:20},{wch:8},{wch:12}];
    XL.utils.book_append_sheet(wb,ws,sup.name.slice(0,28));
  });
  XL.writeFile(wb,'サプライヤ集計_'+new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')+'.xlsx');
}
